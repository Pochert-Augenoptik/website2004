name: Deploy

on:
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install, build, and upload your site
        uses: withastro/action@v5
        with:
          package-manager: npm

      - name: Upload dist artifact for SFTP deploy
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist

  deploy-gh-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-sftp:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -c "
            # Accept the server's host key automatically
            set sftp:auto-confirm yes;

            # Handle special characters by setting the password separately
            set sftp:password '${{ secrets.SFTP_PASS }}';

            # Instruct lftp to send the -a flag (all) to the server when requesting a file list
            # Ensures hidden files (dot-files) are visible
            set ftp:list-options -a;

            # Connect to the host
            open -u ${{ secrets.SFTP_USER }}, sftp://${{ secrets.SFTP_HOST }};

            # --reverse: Upload local to remote
            # --delete: Remove files on server not present in local dist/
            # --include-obvious-hidden: Do not ignore files starting with '.'
            mirror --reverse --delete --verbose --include-obvious-hidden dist/ ${{ secrets.SFTP_PATH }};
          "
