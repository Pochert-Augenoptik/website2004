name: Deploy

on:
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-sftp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install, build, and upload your site
        uses: withastro/action@v5
        with:
          package-manager: npm

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          LFTP_PASSWORD: ${{ secrets.SFTP_PASS }}
        run: |
          lftp -c "
            # Accept the server's host key automatically
            set sftp:auto-confirm yes;

            # Connect to the host; password is read from LFTP_PASSWORD env var
            open --env-password -u ${{ secrets.SFTP_USER }} sftp://${{ secrets.SFTP_HOST }};

            # --reverse: Upload local to remote
            # --delete: Remove files on server not present in local dist/
            # -i includes dot-files like .htaccess which are excluded by default
            mirror --reverse --delete --verbose dist/ ${{ secrets.SFTP_PATH }};
          "

  deploy-gh-pages:
    needs: build-and-sftp
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
